<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDschedule — IHSM</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--radius:14px;--radius-sm:10px;--t:.2s ease;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace}
[data-theme="dark"]{
  --bg:#070b13;--surface:#0f1623;--surface2:#141e2e;--surface3:#1a2640;
  --border:#1c2b42;--border2:#243550;--text:#e4edff;--text2:#8fa3bf;--text3:#3d5270;
  --accent:#4f8ef7;--glow:rgba(79,142,247,.2);--accent2:#00c4d4;--amber:#f5a623;
  --green:#0fd68a;--red:#f25757;--purple:#a78bfa;
  --shadow:0 8px 32px rgba(0,0,0,.5);--shadow-sm:0 2px 12px rgba(0,0,0,.35);
  --hover:rgba(79,142,247,.06);--modal-bg:rgba(5,9,20,.92);
  --date-bg:rgba(79,142,247,.1);--date-border:rgba(79,142,247,.3);--date-text:#4f8ef7;
}
[data-theme="light"]{
  --bg:#eef2fc;--surface:#fff;--surface2:#f3f6ff;--surface3:#e8eeff;
  --border:#d8e0f0;--border2:#bec9e4;--text:#0d1526;--text2:#4a5e80;--text3:#8fa3bf;
  --accent:#2563eb;--glow:rgba(37,99,235,.15);--accent2:#0891b2;--amber:#d97706;
  --green:#059669;--red:#dc2626;--purple:#7c3aed;
  --shadow:0 8px 32px rgba(0,0,0,.1);--shadow-sm:0 2px 12px rgba(0,0,0,.07);
  --hover:rgba(37,99,235,.04);--modal-bg:rgba(0,0,0,.55);
  --date-bg:rgba(37,99,235,.08);--date-border:rgba(37,99,235,.25);--date-text:#2563eb;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--text);min-height:100vh;background:var(--bg);overflow-x:hidden;position:relative;transition:background var(--t),color var(--t)}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
background:radial-gradient(ellipse 80% 60% at 10% -10%,rgba(79,142,247,.1) 0%,transparent 60%),
radial-gradient(ellipse 60% 50% at 90% 110%,rgba(0,196,212,.07) 0%,transparent 55%);
animation:bgpulse 14s ease-in-out infinite alternate}
[data-theme="light"] body::before
