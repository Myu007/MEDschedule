<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IHSM Timetable</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --radius:14px; --radius-sm:8px; --t:.2s ease; --font:'Outfit',sans-serif; --mono:'JetBrains Mono',monospace; }

[data-theme="dark"] {
  --bg:#080c14; --bg2:#0d1220; --surface:#111827; --surface2:#162032; --surface3:#1c2a40;
  --border:#1e2d45; --border2:#243652; --text:#e8f0fe; --text2:#94a3b8; --text3:#4d6080;
  --accent:#3b82f6; --glow:rgba(59,130,246,.2); --accent2:#06b6d4;
  --green:#10b981; --shadow:0 4px 24px rgba(0,0,0,.4); --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --card-hover:rgba(59,130,246,.05);
}
[data-theme="light"] {
  --bg:#f0f4ff; --bg2:#e8eeff; --surface:#fff; --surface2:#f5f7ff; --surface3:#edf0ff;
  --border:#dde3f0; --border2:#c8d0e8; --text:#0f172a; --text2:#475569; --text3:#94a3b8;
  --accent:#2563eb; --glow:rgba(37,99,235,.12); --accent2:#0891b2;
  --green:#059669; --shadow:0 4px 24px rgba(0,0,0,.08); --shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --card-hover:rgba(37,99,235,.04);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--t),color var(--t)}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);box-shadow:var(--shadow-sm)}
.header-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;box-shadow:0 0 16px var(--glow)}
.header-title{font-size:.95rem;font-weight:600}
.header-sub{font-size:.72rem;color:var(--text2)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.theme-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--t)}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:24px 20px 60px}

/* PANEL */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.panel-label{font-size:.63rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:14px}

.grid4{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end}
@media(max-width:700px){.grid4{grid-template-columns:1fr 1fr}.btn-wrap{grid-column:1/-1}}
@media(max-width:420px){.grid4{grid-template-columns:1fr}}

.field label{display:block;font-size:.63rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:6px}

select,input[type=month]{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);font-family:var(--font);font-size:.83rem;appearance:none;-webkit-appearance:none;cursor:pointer;outline:none;transition:border-color var(--t),box-shadow var(--t)}
select:focus,input[type=month]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
select:disabled{opacity:.4;cursor:not-allowed}
.sw{position:relative}
.sw::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:.7rem}
input[type=month]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer}

.teacher-row{margin-top:10px;display:flex;gap:8px;align-items:center}
.ti-wrap{position:relative;flex:1}
.ti-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
input[type=text]{width:100%;padding:10px 12px 10px 32px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);font-family:var(--font);font-size:.83rem;outline:none;transition:border-color var(--t),box-shadow var(--t)}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
input[type=text]::placeholder{color:var(--text3)}
.clear-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px 6px;font-size:15px;display:none;transition:color var(--t);border-radius:6px}
.clear-btn:hover{color:#ef4444}

.btn-search{width:100%;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;border-radius:var(--radius-sm);font-family:var(--font);font-size:.88rem;font-weight:600;cursor:pointer;transition:opacity var(--t),transform .1s;white-space:nowrap;box-shadow:0 4px 12px var(--glow)}
.btn-search:hover{opacity:.88}
.btn-search:active{transform:scale(.97)}
.btn-search:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ERROR */
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:10px 14px;border-radius:var(--radius-sm);font-size:.8rem;margin-bottom:16px;display:none}

/* STATS + TABS */
.stats-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:.72rem;font-family:var(--mono);color:var(--text2);display:flex;align-items:center;gap:5px}
.chip b{color:var(--accent2)}

.day-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:6px 14px;background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:20px;font-size:.73rem;font-family:var(--mono);cursor:pointer;transition:all var(--t);white-space:nowrap}
.day-tab:hover{border-color:var(--accent);color:var(--accent)}
.day-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 12px var(--glow)}

/* CARDS */
.day-group{margin-bottom:20px}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.day-lbl{font-size:.7rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:500}
.day-line{flex:1;height:1px;background:var(--border)}
.day-cnt{font-size:.63rem;font-family:var(--mono);color:var(--text3);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:10px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:96px 1fr auto;gap:12px;align-items:start;transition:background var(--t),border-color var(--t),transform .15s;cursor:default}
.card:hover{background:var(--card-hover);border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.card.hday{opacity:.4}
@media(max-width:560px){.card{grid-template-columns:1fr;gap:8px}}

.c-time{font-family:var(--mono);font-size:.8rem;font-weight:500;color:var(--accent2);white-space:nowrap;padding-top:2px}
.batch-tag{display:inline-block;margin-top:4px;background:var(--glow);color:var(--accent);border:1px solid rgba(59,130,246,.2);padding:1px 7px;border-radius:10px;font-size:.63rem}

.c-subject{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.3}
.c-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.meta{display:flex;align-items:center;gap:4px;font-size:.73rem;color:var(--text2)}

.c-room{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;font-family:var(--mono);font-size:.72rem;color:var(--accent);white-space:nowrap;text-align:center;align-self:start}

.online-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green);padding:2px 8px;border-radius:10px;font-size:.67rem}

/* EMPTY / SPINNER */
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:.85rem}
.empty .ico{font-size:3rem;margin-bottom:12px;opacity:.4;display:block}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

.hl{background:rgba(251,191,36,.25);border-radius:3px;padding:0 2px}

footer{text-align:center;padding:24px 20px;font-size:.68rem;color:var(--text3);font-family:var(--mono);letter-spacing:.06em;border-top:1px solid var(--border)}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">IH</div>
    <div>
      <div class="header-title">IHSM Timetable</div>
      <div class="header-sub">International School of Medicine</div>
    </div>
    <div class="header-right">
      <div class="dot" title="Live"></div>
      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
  </div>
</header>

<main>
  <div class="panel">
    <div class="panel-label">Find Schedule</div>
    <div class="grid4">
      <div class="field">
        <label>Semester</label>
        <div class="sw">
          <select id="semSel">
            <option value="">— Semester —</option>
            <option value="1">1st Course · 1st Sem</option>
            <option value="2">1st Course · 2nd Sem</option>
            <option value="3">2nd Course · 3rd Sem</option>
            <option value="4">2nd Course · 4th Sem</option>
            <option value="5">3rd Course · 5th Sem</option>
            <option value="6">3rd Course · 6th Sem</option>
            <option value="7">4th Course · 7th Sem</option>
            <option value="8">4th Course · 8th Sem</option>
            <option value="9">5th Course · 9th Sem</option>
            <option value="10">5th Course · 10th Sem</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Group</label>
        <div class="sw">
          <select id="grpSel" disabled>
            <option value="">— Pick semester first —</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Month</label>
        <input type="month" id="monthInp" />
      </div>
      <div class="field btn-wrap">
        <label style="visibility:hidden">Go</label>
        <button class="btn-search" id="searchBtn" disabled>Search</button>
      </div>
    </div>

    <div class="teacher-row">
      <div class="ti-wrap">
        <span class="si">🔍</span>
        <input type="text" id="teacherInp" placeholder="Filter by teacher name…" autocomplete="off" />
      </div>
      <button class="clear-btn" id="clearBtn">✕</button>
    </div>
  </div>

  <div class="err" id="errBar"></div>

  <div id="filtersArea" style="display:none">
    <div class="stats-row" id="statsRow"></div>
    <div class="day-tabs" id="dayTabs"></div>
  </div>

  <div id="results">
    <div class="empty"><span class="ico">📅</span>Select a semester &amp; group, then hit Search</div>
  </div>
</main>

<footer>
  IHSM Timetable · Unofficial ·
  Data from <a href="https://timetable.ism.edu.kg" target="_blank">timetable.ism.edu.kg</a>
</footer>

<script>
let allRows = [], activeDay = 'ALL', teacherQ = '';
const CAMPUS = 7;
const DN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const $  = id => document.getElementById(id);
const semSel    = $('semSel');
const grpSel    = $('grpSel');
const monthInp  = $('monthInp');
const searchBtn = $('searchBtn');
const results   = $('results');
const errBar    = $('errBar');
const filtersArea = $('filtersArea');
const statsRow  = $('statsRow');
const dayTabs   = $('dayTabs');
const teacherInp= $('teacherInp');
const clearBtn  = $('clearBtn');
const themeBtn  = $('themeBtn');

// Default month
const now = new Date();
monthInp.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

// Theme
let theme = localStorage.getItem('ihsm-theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);
themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
themeBtn.onclick = () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('ihsm-theme', theme);
};

// Helpers
const showErr = m => { errBar.textContent = m; errBar.style.display = 'block'; };
const hideErr = () => { errBar.style.display = 'none'; };
const loading = m => { results.innerHTML = `<div class="empty"><div class="spinner"></div>${m}</div>`; };

async function post(path, body) {
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (!r.ok) throw new Error(`Error ${r.status}`);
  return r.json();
}

// Semester → groups
semSel.addEventListener('change', async () => {
  const id = parseInt(semSel.value);
  grpSel.disabled = true;
  grpSel.innerHTML = '<option>Loading…</option>';
  searchBtn.disabled = true;
  hideErr();
  if (!id) { grpSel.innerHTML = '<option value="">— Pick semester first —</option>'; return; }
  try {
    const j = await post('/api/groups', { intCampusId:CAMPUS, intSemesterId:id });
    const g = j?.data?.data || j?.data || [];
    grpSel.innerHTML = '<option value="">— Choose group —</option>';
    g.forEach(x => {
      const o = document.createElement('option');
      o.value = x.intId; o.textContent = `Group ${x.strName}`;
      grpSel.appendChild(o);
    });
    grpSel.disabled = false;
  } catch(e) {
    grpSel.innerHTML = '<option value="">— Error —</option>';
    showErr(e.message);
  }
});

grpSel.addEventListener('change', () => { searchBtn.disabled = !grpSel.value; });

// Search
searchBtn.addEventListener('click', async () => {
  const semId = parseInt(semSel.value);
  const grpId = parseInt(grpSel.value);
  const [yr, mo] = monthInp.value.split('-').map(Number);
  if (!grpId || !yr) return;

  hideErr(); loading('Fetching schedule…'); searchBtn.disabled = true;
  filtersArea.style.display = 'none';
  teacherInp.value = ''; teacherQ = ''; clearBtn.style.display = 'none';

  try {
    const j = await post('/api/schedule', {
      intCampusId:CAMPUS, intSemesterId:semId,
      intGroupId:grpId, intYear:yr, intMonth:mo, strFacultyName:''
    });
    allRows = j?.data?.data || j?.data || [];
    activeDay = 'ALL';
    buildFilters();
    render();
  } catch(e) {
    showErr(e.message);
    results.innerHTML = `<div class="empty"><span class="ico">⚠️</span>${e.message}</div>`;
  } finally { searchBtn.disabled = false; }
});

// Teacher filter
teacherInp.addEventListener('input', () => {
  teacherQ = teacherInp.value.trim().toLowerCase();
  clearBtn.style.display = teacherQ ? 'block' : 'none';
  if (allRows.length) render();
});
clearBtn.onclick = () => {
  teacherInp.value = ''; teacherQ = '';
  clearBtn.style.display = 'none';
  if (allRows.length) render();
};

function buildFilters() {
  if (!allRows.length) { filtersArea.style.display = 'none'; return; }
  filtersArea.style.display = 'block';

  const days = new Set(allRows.map(r => r.strClassDate)).size;
  const teachers = new Set(allRows.map(r => r.strEmployeeName).filter(Boolean)).size;
  statsRow.innerHTML = `
    <div class="chip">📚 <b>${allRows.length}</b> classes</div>
    <div class="chip">📅 <b>${days}</b> days</div>
    <div class="chip">👨‍🏫 <b>${teachers}</b> teachers</div>`;

  const daySet = ['ALL'];
  allRows.forEach(r => {
    const d = new Date(r.strClassDay);
    if (!isNaN(d)) { const n = DN[d.getDay()]; if (!daySet.includes(n)) daySet.push(n); }
  });

  dayTabs.innerHTML = '';
  daySet.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (day === activeDay ? ' active' : '');
    btn.textContent = day === 'ALL' ? '📋 All' : day;
    btn.onclick = () => {
      activeDay = day;
      document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    dayTabs.appendChild(btn);
  });
}

function hl(txt, q) {
  if (!q || !txt) return txt || '';
  return txt.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<span class="hl">$1</span>');
}

function render() {
  let rows = allRows;
  if (teacherQ) rows = rows.filter(r => (r.strEmployeeName||'').toLowerCase().includes(teacherQ));
  if (activeDay !== 'ALL') rows = rows.filter(r => { const d = new Date(r.strClassDay); return !isNaN(d) && DN[d.getDay()] === activeDay; });

  if (!rows.length) {
    results.innerHTML = `<div class="empty"><span class="ico">🔍</span>No classes match your filter.</div>`;
    return;
  }

  const byDate = {};
  rows.forEach(r => { const k = r.strClassDate||''; (byDate[k] = byDate[k]||[]).push(r); });
  const sorted = Object.keys(byDate).sort((a,b) => new Date(byDate[a][0]?.strClassDay) - new Date(byDate[b][0]?.strClassDay));

  let html = '';
  sorted.forEach(dk => {
    const d = new Date(byDate[dk][0]?.strClassDay || '');
    const lbl = !isNaN(d) ? `${DN[d.getDay()]}, ${d.getDate()} ${MN[d.getMonth()]} ${d.getFullYear()}` : dk;

    html += `<div class="day-group">
      <div class="day-header">
        <span class="day-lbl">📅 ${lbl}</span>
        <span class="day-line"></span>
        <span class="day-cnt">${byDate[dk].length}</span>
      </div>`;

    byDate[dk].forEach(r => {
      html += `<div class="card${r.intIsHoliday===1?' hday':''}">
        <div class="c-time">${r.strClassTime||'—'}${r.strBatch?`<div><span class="batch-tag">B${r.strBatch}</span></div>`:''}</div>
        <div>
          <div class="c-subject">${r.strSubject||'—'}</div>
          <div class="c-meta">
            <span class="meta">👤 ${hl(r.strEmployeeName||'—', teacherQ)}</span>
            ${r.intOnlineClass===1?'<span class="online-tag">🌐 Online</span>':''}
          </div>
        </div>
        <div class="c-room">${r.strRoomName||'—'}</div>
      </div>`;
    });
    html += `</div>`;
  });

  results.innerHTML = html;
}
</script>
</body>
</html>
